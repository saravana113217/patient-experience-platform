<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedCore Secure Login</title>
<link rel="stylesheet" href="/static/style.css">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#0f172a,#020617);
  font-family:Segoe UI, sans-serif;
  overflow:hidden;
}

/* Floating glow circles */
body::before,
body::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  filter:blur(120px);
  opacity:.5;
}
body::before{
  background:#22d3ee;
  top:-150px;
  left:-150px;
}
body::after{
  background:#a78bfa;
  bottom:-150px;
  right:-150px;
}

/* Glass card */
.card{
  position:relative;
  width:360px;
  padding:40px;
  border-radius:20px;
  backdrop-filter: blur(20px);
  background:rgba(15,23,42,.6);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 25px 80px rgba(0,0,0,.7);
  color:white;
  text-align:center;
  z-index:10;
}

.card h1{
  margin-bottom:25px;
  font-weight:600;
  letter-spacing:.5px;
}

/* Inputs */
.input{
  width:100%;
  padding:14px;
  margin:12px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(2,6,23,.7);
  color:white;
  font-size:15px;
  outline:none;
  transition:.25s;
}

.input:focus{
  border-color:#22d3ee;
  box-shadow:0 0 0 2px rgba(34,211,238,.25);
}

/* Button */
.btn{
  width:100%;
  padding:14px;
  margin-top:18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#22d3ee,#6366f1);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(34,211,238,.4);
}

.note{
  margin-top:14px;
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="card">
  <h1>🏥 MedCore</h1>

  <input id="username" class="input" placeholder="Username">
  <input id="password" class="input" type="password" placeholder="Password">

  <button class="btn" onclick="login()">Login</button>

  <div class="note">
    Admin: <b>admin</b> / <b>admin123</b>
  </div>
</div>

<script>
async function login(){

  const username = document.getElementById("username").value
  const password = document.getElementById("password").value

  const res = await fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,password})
  })

  const data = await res.json()

  if(data.success){
    window.location.href="/"
  }else{
    alert("Invalid credentials")
  }
}
</script>

</body>
</html>
